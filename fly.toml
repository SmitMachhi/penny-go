app = "penny-go"
primary_region = "yyz"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "3000"
  PENNY_REPO_ROOT = "/app"
  OPENCLAW_STATE_DIR = "/app/workspace/.openclaw-state"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 40

[mounts]
  source = "penny_workspace"
  destination = "/app/workspace"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
